<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservoir Data Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>
</head>
<body>
<header>
  <div class="logo">💧</div>
  <div>
    <h1>Reservoir Inflow–Outflow Data Tool</h1>
    <p>รองรับข้อมูล 2 รูปแบบ · Auto-detect · ปีน้ำ เม.ย.–มี.ค. (พ.ศ.)</p>
  </div>
</header>
<div class="container">
  <div class="input-card">
    <h2>📋 วางข้อมูลที่นี่</h2>
    <div class="format-detect" id="formatBadge">
      <span class="dot"></span><span id="formatLabel">ยังไม่ได้วางข้อมูล</span>
    </div>
    <textarea id="excelData" placeholder="วางข้อมูลจากระบบ..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="generateTables()">⚡ Generate Data</button>
      <button class="btn-secondary" onclick="clearAll()">✕ Clear</button>
      <button class="btn-export" id="exportBtn" onclick="exportExcel()" disabled>↓ Export Excel</button>
    </div>
  </div>
  <div id="output">
    <div class="meta-bar" id="metaBar"></div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3><span class="badge badge-in">INFLOW</span><span id="inflowTitle"></span></h3>
        <canvas id="inflowChart"></canvas>
      </div>
      <div class="chart-card">
        <h3><span class="badge badge-out">OUTFLOW</span><span id="outflowTitle"></span></h3>
        <canvas id="outflowChart"></canvas>
      </div>
    </div>
    <div class="section-title"><span class="badge badge-in">INFLOW</span><span id="inflowSectionTitle">ปริมาณน้ำไหลลงอ่าง (ล้าน ลบ.ม.)</span></div>
    <div class="table-scroll" id="inflowTableDiv"></div>
    <div class="section-title"><span class="badge badge-out">OUTFLOW</span><span id="outflowSectionTitle">ปริมาณน้ำระบาย (ล้าน ลบ.ม.)</span></div>
    <div class="table-scroll" id="outflowTableDiv"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
